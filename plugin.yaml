name: cloakbrowser-hermes-plugin
manifest_version: 2
version: 0.1.0
description: "Direct-SDK CloakBrowser foundation for Hermes browser_* tool overrides."
author: LunarNexus
kind: standalone
provides_tools:
  - browser_navigate
  - browser_snapshot
  - browser_click
  - browser_type
  - browser_scroll
  - browser_back
  - browser_press
  - browser_get_images
  - browser_console
  - browser_dialog
  - browser_vision
provides_hooks: []
requires_env: []
config_defaults:
  user_data_dir:
    $profile_path: browser-profiles/cloakbrowser
  headless: false
  humanize: true
  human_preset: careful
  stealth_args: true
  fingerprint_seed:
    $random_digits: 5
  geoip: false
  args: []
